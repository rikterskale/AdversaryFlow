name: ci

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Check for unresolved merge conflict markers
        run: |
          if git grep -nP '^(<{7}|={7}|>{7})( |$)' -- . ':!*.lock'; then
            echo "::error::Unresolved merge conflict markers found"; exit 1
          fi
      - run: pip install -e '.[dev]'
      - run: ruff check src tests
      - run: ruff format --check src tests
      - run: pytest -q
      - name: Smoke-test the deterministic demo
        run: adversaryflow generate --request examples/apt29_request.json --output reports/ci_demo.md --demo
